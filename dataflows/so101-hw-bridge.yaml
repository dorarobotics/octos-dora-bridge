# octos -> SO-101 (LeRobot 5-DOF arm) HARDWARE via dora-moveit2 + rebot_hw_node.
#
# This is so101-mujoco-bridge.yaml with ONE structural change: `mujoco_sim` +
# `gripper_merge` are replaced by a single `rebot_hw` node that drives the real
# LeRobot/Feetech bus. Everything else — moveit_arm_node, planner, ik_solver,
# trajectory_executor, bridge — is IDENTICAL to the sim dataflow.
#
#   sim:      mujoco_sim + gripper_merge   (control_input -> physics)
#   hardware: rebot_hw                      (joint_commands + gripper_command -> motors)
#
# rebot_hw emits joint_positions in the SAME qpos layout as the sim (object slots
# padded with zeros) so ARM_QPOS_START=7 and downstream indices are unchanged.
#
# ${DORA_MOVEIT2} = dora-moveit2 checkout; ${SKILL_PACK} = moveit-arm-dora-node/skill_pack.
# dora can't interpolate env in path:/args:, so the live run uses a copy with resolved paths.

nodes:
  - id: rebot_hw
    path: ./venv-python
    args: -m rebot_hw_node.node
    env:
      ROBOT_BACKEND: lerobot
      ROBOT_MANIFEST: ./manifests/so101-hw.json
    inputs:
      joint_commands: trajectory_executor/joint_commands
      gripper_command: moveit_arm/gripper_command
      tick: dora/timer/millis/20
    outputs:
      - joint_positions
      - joint_velocities

  - id: planning_scene
    path: ./venv-python
    args: ${DORA_MOVEIT2}/examples/move_group_demo/move_group_demo/nodes/planning_scene.py
    env: { ROBOT_CONFIG_MODULE: "move_group_demo.config.so101" }
    inputs:
      robot_state: rebot_hw/joint_positions
      scene_command: moveit_arm/scene_command
      tick: dora/timer/millis/5000
    outputs: [scene_update, command_result]

  - id: planner
    path: ./venv-python
    args: ${DORA_MOVEIT2}/examples/move_group_demo/move_group_demo/nodes/planner.py
    env: { ROBOT_CONFIG_MODULE: "move_group_demo.config.so101", PLANNER_TYPE: "simple" }
    inputs:
      plan_request: moveit_arm/plan_request
      scene_update: planning_scene/scene_update
    outputs: [trajectory, plan_status]

  - id: ik_solver
    path: ./venv-python
    args: ${DORA_MOVEIT2}/examples/move_group_demo/move_group_demo/nodes/ik_solver.py
    env: { ROBOT_CONFIG_MODULE: "move_group_demo.config.so101", IK_SOLVER_TYPE: "de" }
    inputs:
      ik_request: moveit_arm/ik_request
    outputs: [ik_solution, ik_status]

  - id: trajectory_executor
    path: ./venv-python
    args: ${DORA_MOVEIT2}/examples/move_group_demo/move_group_demo/nodes/trajectory_executor.py
    env: { ROBOT_CONFIG_MODULE: "move_group_demo.config.so101" }
    inputs:
      trajectory: planner/trajectory
      cartesian_trajectory: moveit_arm/cartesian_trajectory
      joint_positions: rebot_hw/joint_positions
      tick: dora/timer/millis/50
    outputs: [joint_commands, execution_status]

  - id: moveit_arm
    path: ./venv-python
    args: -m moveit_arm_node
    env:
      ROBOT_ID: so101-hw-001
      ROBOT_CONFIG_MODULE: "move_group_demo.config.so101"
      GRIPPER_DRIVER: mujoco
      HEARTBEAT_TIMEOUT_MS: "0"
    inputs:
      cmd_request: bridge/cmd_request
      joint_positions: rebot_hw/joint_positions
      plan_status: planner/plan_status
      trajectory: planner/trajectory
      execution_status: trajectory_executor/execution_status
      ik_solution: ik_solver/ik_solution
      ik_status: ik_solver/ik_status
      command_result: planning_scene/command_result
    outputs:
      - cmd_response
      - capabilities
      - state
      - safety_event
      - plan_request
      - ik_request
      - scene_command
      - cartesian_trajectory
      - gripper_command

  - id: bridge
    path: ./venv-python
    args: -m octos_spec_bridge
    env:
      ROBOT_ID: so101-hw-001
      HTTP_HOST: "127.0.0.1"
      HTTP_PORT: "8768"
      CMD_TIMEOUT_S: "60"
    inputs:
      cmd_response: moveit_arm/cmd_response
      capabilities: moveit_arm/capabilities
      state: moveit_arm/state
      safety_event: moveit_arm/safety_event
    outputs: [cmd_request]
